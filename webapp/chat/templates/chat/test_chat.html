<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACU — test sohbet</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; min-height: 6rem; box-sizing: border-box; }
    button { margin-top: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; }
    #out { margin-top: 1rem; white-space: pre-wrap; border: 1px solid #ccc; padding: 1rem; border-radius: 6px; background: #fafafa; }
    .err { color: #a00; }
  </style>
</head>
<body>
  <h1>Test sohbet (geçici)</h1>
  <p>Berya arayüzü hazır olana kadar: soruyu yaz, <strong>Gönder</strong> ile
    <code id="api-label"></code> çağrılır (sonunda <code>/</code> var).</p>
  <label for="q">Soru</label>
  <textarea id="q" placeholder="Örn: Bologna süreci nedir?"></textarea>
  <div><button type="button" id="send">Gönder</button></div>
  <div id="out" aria-live="polite"></div>
  <script>
    const API_URL = new URL("/api/chat/", window.location.origin).href;
    document.getElementById("api-label").textContent = new URL("/api/chat/", window.location.origin).pathname;

    const out = document.getElementById("out");
    document.getElementById("send").addEventListener("click", async () => {
      const query = document.getElementById("q").value.trim();
      if (!query) { out.textContent = "Lütfen bir soru yazın."; return; }
      out.classList.remove("err");
      out.textContent = "Yükleniyor…";
      const longWait = window.setTimeout(() => {
        if (out.textContent === "Yükleniyor…") {
          out.textContent = "Model yanıt hazırlıyor (birkaç dakika sürebilir)…";
        }
      }, 45000);
      try {
        const r = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
          },
          body: JSON.stringify({ query }),
        });
        const ct = (r.headers.get("content-type") || "").toLowerCase();
        const rawText = await r.text();
        if (!ct.includes("application/json")) {
          out.textContent =
            "JSON bekleniyordu; sunucu HTML veya başka içerik döndü (HTTP " + r.status + "). İlk 400 karakter:\n\n" +
            rawText.slice(0, 400);
          out.classList.add("err");
          return;
        }
        out.classList.remove("err");
        let data;
        try {
          data = JSON.parse(rawText);
        } catch (parseErr) {
          out.classList.add("err");
          out.textContent = "JSON ayrıştırma hatası: " + parseErr;
          return;
        }
        if (!data.ok) {
          out.classList.add("err");
          let errBody = data.error || ("HTTP " + r.status);
          if (data.detail) {
            errBody += "\n\nDetay:\n" + data.detail;
          }
          if (data.traceback) {
            errBody += "\n\nTraceback (DEBUG):\n" + data.traceback;
          }
          out.textContent = errBody;
          return;
        }
        out.classList.remove("err");
        let msg = data.answer || "";
        if (data.warning) {
          msg += "\n\n[" + data.warning + "]";
        }
        out.textContent = msg;
      } catch (e) {
        out.classList.add("err");
        out.textContent = String(e);
      } finally {
        window.clearTimeout(longWait);
      }
    });
  </script>
</body>
</html>
