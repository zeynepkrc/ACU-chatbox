<!DOCTYPE html>
<html>
<head>
    <title>ACU AI Chatbot</title>
</head>
<body>
    <h1>ACU AI Chatbot</h1>

    <form method="get" action="/">
        <input type="text" name="q" placeholder="Ask a question..." style="width:300px;">
        <button type="submit">Ask</button>
    </form>

    {% if question %}
        <h3>Question:</h3>
        <p>{{ question }}</p>

        <h3>Answer:</h3>
        <p>{{ answer }}</p>
        {% if sources %}
        <h3>Sources:</h3>
        <ul>
            {% for source in sources %}
                <li><a href="{{ source }}" target="_blank">{{ source }}</a></li>
            {% endfor %}
        </ul>
    {% endif %}
    {% endif %}
</body>
</html>
