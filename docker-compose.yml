name: acibadem-chatbot

networks:
  acu-network:
    driver: bridge

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    # CPU-only: do not attach NVIDIA runtime; Ollama will use CPU by default.
    networks:
      - acu-network
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama-entry.sh:/ollama-entry.sh:ro
    environment:
      OLLAMA_START_MODEL: ${OLLAMA_START_MODEL:-qwen2.5:7b}
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    entrypoint: ["/bin/sh", "/ollama-entry.sh"]

  db:
    image: postgres:16-alpine
    networks:
      - acu-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    networks:
      - acu-network
    command:
      - /bin/sh
      - -c
      - cd /app && python manage.py migrate --noinput && python manage.py collectstatic --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload --timeout 0 --graceful-timeout 600
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web,0.0.0.0}
      POSTGRES_USER: ${POSTGRES_USER:-acu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acu}
      POSTGRES_DB: ${POSTGRES_DB:-acu_chatbot}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_REQUEST_CONNECT_SEC: ${OLLAMA_REQUEST_CONNECT_SEC:-45}
      OLLAMA_REQUEST_TIMEOUT_SEC: ${OLLAMA_REQUEST_TIMEOUT_SEC:-3600}
      RAG_CONTEXT_MAX_DOCUMENTS: ${RAG_CONTEXT_MAX_DOCUMENTS:-3}
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./webapp:/app

volumes:
  postgres_data:
  ollama_data:
