services:
  web:
    build: ./webapp
    container_name: acu_web
    ports:
      - "8000:8000"
    volumes:
      - ./webapp:/app
    depends_on:
      - db
      - ollama

  db:
    image: postgres:15
    container_name: acu_db
    environment:
      POSTGRES_DB: acudb
      POSTGRES_USER: acuuser
      POSTGRES_PASSWORD: acupass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    container_name: acu_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: